<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome Back | GRP</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/styles.css" />

    <!-- Hide footer only on home page (kept from your original intent) -->
    <style>
        footer {
            display: none;
        }

        body {
            overflow: hidden;
        }
    </style>
</head>

<body class="bg-dark text-light">

    <div class="container-fluid p-0">
        <div class="row g-0 min-vh-100">

            <!-- LEFT: Text -->
            <div class="col-lg-6 d-flex align-items-center bg-dark">
                <div class="px-5 px-md-6">
                    <h1 class="display-3 fw-bold mb-3">
                        Welcome<br>Back
                    </h1>

                    <p class="text-secondary fs-5 mb-4" style="max-width: 420px;">
                        Sign in to record, transcribe, and manage your speech requests.
                    </p>

                    <p class="text-secondary">
                        Don’t have an account?
                        <a href="register.html" class="text-light fw-semibold text-decoration-none">
                            Create one
                        </a>
                    </p>

                    <div class="mt-4 d-flex gap-3">
                        <a class="btn btn-primary btn-lg" href="login.html">
                            Sign in
                        </a>
                        <a class="btn btn-outline-light btn-lg" href="register.html">
                            Register
                        </a>
                    </div>
                </div>
            </div>

            <!-- RIGHT: Simple panel -->
            <div class="col-lg-6 d-flex align-items-center justify-content-center bg-black">
                <div class="w-100 text-center" style="max-width: 420px;">
                    <i class="bi bi-mic-fill" style="font-size: 4rem;"></i>
                    <h2 class="fw-bold mt-3">GRP</h2>
                    <p class="text-secondary mt-2">
                        Speech to Text • Ticket Workflow • Dashboard
                    </p>

                    <div class="mt-4">
                        <a class="btn btn-primary btn-lg w-100" href="login.html">Go to Login</a>
                        <a class="btn btn-outline-secondary btn-lg w-100 mt-3" href="dashboard.html">Go to Dashboard</a>
                    </div>

                    <p class="text-secondary small text-center mt-4">
                        By using GRP, you agree to our
                        <a href="terms.html" class="text-secondary">Terms</a> &
                        <a href="privacy.html" class="text-secondary">Privacy Policy</a>
                    </p>
                </div>
            </div>

        </div>
    </div>

    <!-- If already logged in, jump to dashboard -->
    <script type="module">
        import { getToken } from "../assets/js/auth.js";
        if (getToken()) {
            window.location.href = "dashboard.html";
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
