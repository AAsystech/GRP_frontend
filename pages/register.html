<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | GRP</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Your custom theme -->
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- Top Navbar -->
  <nav class="navbar navbar-expand-lg border-bottom" style="background:#1e1e1e;">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2 text-light" href="home.html">
        <span style="font-size:18px;">🎤</span>
        <span class="fw-semibold">GRP</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav"
        aria-controls="topNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="topNav">
        <ul class="navbar-nav gap-lg-2">
          <li class="nav-item"><a class="nav-link text-light" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link text-light active" aria-current="page"
              href="register.html">Register</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Centered Register Card -->
  <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="auth-container w-100 px-3">
      <div class="card p-4 p-md-5 border-gradient mx-auto" style="max-width: 780px;">
        <div class="text-center mb-4">
          <h1 class="text-gradient mb-2">Create Account</h1>
          <p class="text-muted mb-0">Join our speech transcription platform</p>
        </div>

        <form id="register-form" class="transition" novalidate>
          <!-- Profile -->
          <h5 class="mb-3">Profile</h5>
          <div class="row g-3">
            <div class="col-12">
              <label for="display_name" class="form-label">Display name <span
                  class="text-muted">(optional)</span></label>
              <input type="text" class="form-control form-control-lg" id="display_name"
                placeholder="How should we refer to you?" autocomplete="nickname" />
            </div>

            <div class="col-md-6">
              <label for="first_name" class="form-label">First name</label>
              <input type="text" class="form-control form-control-lg" id="first_name" required placeholder="First name"
                autocomplete="given-name" />
            </div>

            <div class="col-md-6">
              <label for="last_name" class="form-label">Last name</label>
              <input type="text" class="form-control form-control-lg" id="last_name" required placeholder="Last name"
                autocomplete="family-name" />
            </div>
          </div>

          <hr class="my-4" />

          <!-- Contact -->
          <h5 class="mb-3">Contact</h5>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control form-control-lg" id="email" required
                placeholder="Enter your email" autocomplete="email" />
            </div>

            <div class="col-md-6">
              <label for="phone" class="form-label">Phone number <span class="text-muted">(optional)</span></label>
              <input type="tel" class="form-control form-control-lg" id="phone" placeholder="e.g., +1 555 123 4567"
                autocomplete="tel" inputmode="tel" />
            </div>
          </div>

          <hr class="my-4" />

          <!-- Address -->
          <h5 class="mb-3">Address</h5>
          <div class="row g-3">
            <div class="col-12">
              <label for="address_line1" class="form-label">Address line 1</label>
              <input type="text" class="form-control form-control-lg" id="address_line1" required
                placeholder="Street address, P.O. box, company name" autocomplete="address-line1" />
            </div>

            <div class="col-12">
              <label for="address_line2" class="form-label">Address line 2 <span
                  class="text-muted">(optional)</span></label>
              <input type="text" class="form-control form-control-lg" id="address_line2"
                placeholder="Apartment, suite, unit, building, floor, etc." autocomplete="address-line2" />
            </div>

            <div class="col-md-6">
              <label for="city" class="form-label">City/Village</label>
              <input type="text" class="form-control form-control-lg" id="city" required placeholder="City or Village"
                autocomplete="address-level2" />
            </div>

            <div class="col-md-6">
              <label for="subdistrict" class="form-label">Subdistrict (Mandal)</label>
              <input type="text" class="form-control form-control-lg" id="subdistrict" required
                placeholder="Subdistrict / Mandal" />
            </div>

            <div class="col-md-6">
              <label for="district" class="form-label">District</label>
              <input type="text" class="form-control form-control-lg" id="district" required placeholder="District" />
            </div>

            <div class="col-md-6">
              <label for="state" class="form-label">State</label>
              <input type="text" class="form-control form-control-lg" id="state" required placeholder="State"
                autocomplete="address-level1" />
            </div>

            <div class="col-md-6">
              <label for="postal_code" class="form-label">Postal code</label>
              <input type="text" class="form-control form-control-lg" id="postal_code" required
                placeholder="ZIP/Postal code" autocomplete="postal-code" />
            </div>

            <div class="col-md-6">
              <label for="country" class="form-label">Country</label>
              <input type="text" class="form-control form-control-lg" id="country" required placeholder="Country"
                autocomplete="country-name" />
            </div>
          </div>

          <hr class="my-4" />

          <!-- Security -->
          <h5 class="mb-3">Security</h5>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control form-control-lg" id="password" required minlength="8"
                placeholder="Create a password (min 8 characters)" autocomplete="new-password" />
            </div>

            <div class="col-md-6">
              <label for="confirm_password" class="form-label">Confirm password</label>
              <input type="password" class="form-control form-control-lg" id="confirm_password" required minlength="8"
                placeholder="Re-enter your password" autocomplete="new-password" />
            </div>
          </div>

          <div id="register-error" class="mt-3 text-danger" style="display:none;"></div>
          <div id="register-success" class="mt-3 text-success" style="display:none;"></div>

          <button type="submit" class="btn btn-primary w-100 mt-4 btn-lg" id="register-submit">
            Create Account
          </button>

          <div class="mt-3 text-muted small">
            By creating an account you agree to our terms.
          </div>
        </form>

        <div class="mt-4 text-center">
          <p class="mb-0">Already have an account? <a href="login.html">Login here</a></p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-top py-3 mt-auto" style="background:#1e1e1e;">
    <div class="container text-center text-light small">
      GRP - Speech to Text Transcription © 2026
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- IMPORTANT: This page uses api.js like your login does -->
  <script type="module">
    import { api } from "../assets/js/api.js";

    const form = document.getElementById("register-form");
    const errorEl = document.getElementById("register-error");
    const successEl = document.getElementById("register-success");
    const btn = document.getElementById("register-submit");

    const stateEl = document.getElementById("state");
    const districtEl = document.getElementById("district");
    const subdistrictEl = document.getElementById("subdistrict");
    const localBodyEl = document.getElementById("local_body");

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = "block";
    }

    function hideError() {
      errorEl.textContent = "";
      errorEl.style.display = "none";
    }

    function showSuccess(msg) {
      successEl.textContent = msg;
      successEl.style.display = "block";
    }

    function hideSuccess() {
      successEl.textContent = "";
      successEl.style.display = "none";
    }

    function resetSelect(selectEl, placeholder) {
      selectEl.innerHTML = `<option value="">${placeholder}</option>`;
      selectEl.disabled = true;
    }

    function fillSelect(selectEl, items, placeholder) {
      selectEl.innerHTML = `<option value="">${placeholder}</option>`;

      for (const item of items) {
        const option = document.createElement("option");
        option.value = String(item.org_unit_id);
        option.textContent = item.org_name;
        option.dataset.name = item.org_name;
        selectEl.appendChild(option);
      }

      selectEl.disabled = false;
    }

    async function loadStates() {
      try {
        const states = await api.get("/org/states", { auth: false });
        fillSelect(stateEl, states || [], "Select state");
      } catch (err) {
        console.error("Failed to load states", err);
        showError("Could not load states.");
      }
    }

    stateEl.addEventListener("change", async () => {
      resetSelect(districtEl, "Select district");
      resetSelect(subdistrictEl, "Select subdistrict");
      resetSelect(localBodyEl, "Select local body");

      if (!stateEl.value) return;

      try {
        const districts = await api.get(`/org/districts?state_id=${encodeURIComponent(stateEl.value)}`, { auth: false });
        fillSelect(districtEl, districts || [], "Select district");
      } catch (err) {
        console.error("Failed to load districts", err);
        showError("Could not load districts.");
      }
    });

    districtEl.addEventListener("change", async () => {
      resetSelect(subdistrictEl, "Select subdistrict");
      resetSelect(localBodyEl, "Select local body");

      if (!districtEl.value) return;

      try {
        const subdistricts = await api.get(`/org/subdistricts?district_id=${encodeURIComponent(districtEl.value)}`, { auth: false });
        fillSelect(subdistrictEl, subdistricts || [], "Select subdistrict");
      } catch (err) {
        console.error("Failed to load subdistricts", err);
        showError("Could not load subdistricts.");
      }
    });

    subdistrictEl.addEventListener("change", async () => {
      resetSelect(localBodyEl, "Select local body");

      if (!subdistrictEl.value) return;

      try {
        const localBodies = await api.get(`/org/local-bodies?subdistrict_id=${encodeURIComponent(subdistrictEl.value)}`, { auth: false });
        fillSelect(localBodyEl, localBodies || [], "Select local body");
      } catch (err) {
        console.error("Failed to load local bodies", err);
        showError("Could not load local bodies.");
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError();
      hideSuccess();

      const password = document.getElementById("password")?.value || "";
      const confirm = document.getElementById("confirm_password")?.value || "";
      if (password !== confirm) {
        showError("Passwords do not match.");
        return;
      }

      const payload = {
        email: (document.getElementById("email")?.value || "").trim().toLowerCase(),
        password,

        first_name: (document.getElementById("first_name")?.value || "").trim(),
        last_name: (document.getElementById("last_name")?.value || "").trim(),
        address_line1: (document.getElementById("address_line1")?.value || "").trim(),
        city: (document.getElementById("city")?.value || "").trim(),

        state: stateEl.options[stateEl.selectedIndex]?.dataset.name || "",
        district: districtEl.options[districtEl.selectedIndex]?.dataset.name || "",
        sub_district: subdistrictEl.options[subdistrictEl.selectedIndex]?.dataset.name || "",
        local_body: localBodyEl.options[localBodyEl.selectedIndex]?.dataset.name || "",

        postal_code: (document.getElementById("postal_code")?.value || "").trim(),
        country: (document.getElementById("country")?.value || "").trim(),

        display_name: (document.getElementById("display_name")?.value || "").trim() || null,
        phone: (document.getElementById("phone")?.value || "").trim() || null,
        address_line2: (document.getElementById("address_line2")?.value || "").trim() || null,
      };

      const required = [
        "email",
        "password",
        "first_name",
        "last_name",
        "address_line1",
        "city",
        "state",
        "district",
        "sub_district",
        "local_body",
        "postal_code",
        "country"
      ];

      const missing = required.filter((k) => !payload[k]);
      if (missing.length) {
        showError(`Please fill required fields: ${missing.join(", ")}`);
        return;
      }

      try {
        btn.disabled = true;
        btn.textContent = "Creating...";

        const data = await api.post("/auth/register", payload, { auth: false });

        showSuccess(data?.message || "Registration successful! Redirecting to login...");
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1200);

      } catch (err) {
        showError(err?.message || "Registration failed.");
        console.error("Register error:", err);
      } finally {
        btn.disabled = false;
        btn.textContent = "Create Account";
      }
    });

    document.addEventListener("DOMContentLoaded", loadStates);
  </script>

</body>

</html>
