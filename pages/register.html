<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | GRP</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Your custom theme -->
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- Top Navbar -->
  <nav class="navbar navbar-expand-lg border-bottom" style="background:#1e1e1e;">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2 text-light" href="home.html">
        <span style="font-size:18px;">🎤</span>
        <span class="fw-semibold">GRP</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav"
        aria-controls="topNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="topNav">
        <ul class="navbar-nav gap-lg-2">
          <li class="nav-item"><a class="nav-link text-light" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link text-light active" aria-current="page"
              href="register.html">Register</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Centered Register Card -->
  <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="auth-container w-100 px-3">
      <div class="card p-4 p-md-5 border-gradient mx-auto" style="max-width: 780px;">
        <div class="text-center mb-4">
          <h1 class="text-gradient mb-2">Create Account</h1>
          <p class="text-muted mb-0">Join our speech transcription platform</p>
        </div>

        <form id="register-form" class="transition">
          <!-- Profile -->
          <h5 class="mb-3">Profile</h5>
          <div class="row g-3">
            <div class="col-12">
              <label for="display_name" class="form-label">Display name (optional)</label>
              <input type="text" class="form-control form-control-lg" id="display_name"
                placeholder="How should we refer to you?" />
            </div>

            <div class="col-md-6">
              <label for="first_name" class="form-label">First name</label>
              <input type="text" class="form-control form-control-lg" id="first_name" required />
            </div>

            <div class="col-md-6">
              <label for="last_name" class="form-label">Last name</label>
              <input type="text" class="form-control form-control-lg" id="last_name" required />
            </div>
          </div>

          <hr class="my-4" />

          <!-- Contact -->
          <h5 class="mb-3">Contact</h5>
          <div class="row g-3">
            <div class="col-md-7">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control form-control-lg" id="email" required />
            </div>

            <div class="col-md-5">
              <label for="phone" class="form-label">Phone (optional)</label>
              <input type="tel" class="form-control form-control-lg" id="phone" />
            </div>
          </div>

          <hr class="my-4" />

          <!-- Address -->
          <h5 class="mb-3">Address</h5>
          <div class="row g-3">
            <div class="col-12">
              <label for="address_line1" class="form-label">Address line 1</label>
              <input type="text" class="form-control form-control-lg" id="address_line1" required />
            </div>

            <div class="col-12">
              <label for="address_line2" class="form-label">Address line 2 (optional)</label>
              <input type="text" class="form-control form-control-lg" id="address_line2" />
            </div>

            <div class="col-md-6">
              <label for="city" class="form-label">City</label>
              <input type="text" class="form-control form-control-lg" id="city" required />
            </div>

            <div class="col-md-3">
              <label for="state" class="form-label">State</label>
              <input type="text" class="form-control form-control-lg" id="state" required />
            </div>

            <div class="col-md-3">
              <label for="postal_code" class="form-label">Postal code</label>
              <input type="text" class="form-control form-control-lg" id="postal_code" required />
            </div>

            <div class="col-md-6">
              <label for="country" class="form-label">Country</label>
              <input type="text" class="form-control form-control-lg" id="country" required />
            </div>
          </div>

          <hr class="my-4" />

          <!-- Security -->
          <h5 class="mb-3">Security</h5>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control form-control-lg" id="password" required minlength="8" />
            </div>

            <div class="col-md-6">
              <label for="confirm_password" class="form-label">Confirm password</label>
              <input type="password" class="form-control form-control-lg" id="confirm_password" required
                minlength="8" />
            </div>
          </div>

          <div id="register-error" class="mt-3 text-danger" style="display:none;"></div>
          <div id="register-success" class="mt-3 text-success" style="display:none;"></div>

          <button type="submit" class="btn btn-primary w-100 mt-4 btn-lg">
            Create Account
          </button>
        </form>

        <div class="mt-4 text-center">
          <p class="mb-0">Already have an account? <a href="login.html">Login here</a></p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-top py-3 mt-auto" style="background:#1e1e1e;">
    <div class="container text-center text-light small">
      GRP - Speech to Text Transcription © 2026
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Register logic (matches your backend) -->
  <script type="module">
    const form = document.getElementById("register-form");
    const errorEl = document.getElementById("register-error");
    const successEl = document.getElementById("register-success");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.style.display = "none";
      successEl.style.display = "none";

      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm_password").value;
      if (password !== confirm) {
        errorEl.textContent = "Passwords do not match.";
        errorEl.style.display = "block";
        return;
      }

      const payload = {
        email: document.getElementById("email").value.trim().toLowerCase(),
        password,

        first_name: document.getElementById("first_name").value.trim(),
        last_name: document.getElementById("last_name").value.trim(),

        address_line1: document.getElementById("address_line1").value.trim(),
        address_line2: document.getElementById("address_line2").value.trim() || null,
        city: document.getElementById("city").value.trim(),
        state: document.getElementById("state").value.trim(),
        postal_code: document.getElementById("postal_code").value.trim(),
        country: document.getElementById("country").value.trim(),

        display_name: document.getElementById("display_name").value.trim() || null,
        phone: document.getElementById("phone").value.trim() || null,
      };

      try {
        const res = await fetch("/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          errorEl.textContent = data.detail || "Registration failed.";
          errorEl.style.display = "block";
          return;
        }

        successEl.textContent = "Registration successful! Redirecting to login...";
        successEl.style.display = "block";

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1200);

      } catch (err) {
        errorEl.textContent = "Network error. Could not reach server.";
        errorEl.style.display = "block";
      }
    });
  </script>

</body>

</html>
