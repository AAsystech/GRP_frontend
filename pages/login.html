<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | GRP</title>

  <!-- Bootstrap (so btn/card/form-control/navbar work like in screenshot) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Your custom theme overrides -->
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- Top Navbar -->
  <nav class="navbar navbar-expand-lg border-bottom" style="background:#1e1e1e;">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2 text-light" href="home.html">
        <span style="font-size:18px;">🎤</span>
        <span class="fw-semibold">GRP</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav"
        aria-controls="topNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="topNav">
        <ul class="navbar-nav gap-lg-2">
          <li class="nav-item"><a class="nav-link text-light" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link text-light active" aria-current="page" href="login.html">Login</a>
          </li>
          <li class="nav-item"><a class="nav-link text-light" href="register.html">Register</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Centered Login Card -->
  <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="auth-container w-100 px-3">
      <div class="card p-4 p-md-5 border-gradient mx-auto" style="max-width: 620px;">
        <div class="text-center mb-4">
          <h1 class="text-gradient mb-2">Login to GRP</h1>
          <p class="text-muted mb-0">Access your speech transcription dashboard</p>
        </div>

        <form id="login-form" class="transition">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control form-control-lg" id="email" required placeholder="Enter your email"
              autocomplete="email" />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control form-control-lg" id="password" required
              placeholder="Enter your password" autocomplete="current-password" />
          </div>

          <button type="submit" class="btn btn-primary w-100 mt-3 btn-lg">
            Login
          </button>

          <div id="login-error" class="mt-3 text-danger" style="display:none;"></div>
        </form>

        <div class="mt-4 text-center">
          <p class="mb-0">
            Don't have an account?
            <a href="register.html">Register here</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-top py-3 mt-auto" style="background:#1e1e1e;">
    <div class="container text-center text-light small">
      GRP - Speech to Text Transcription © 2026
    </div>
  </footer>

  <!-- Bootstrap JS (needed for navbar collapse on mobile) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- IMPORTANT: Load as ES module -->
  <script type="module" src="../assets/js/auth.js"></script>

</body>

</html>
