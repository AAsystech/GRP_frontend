<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Login | GRP</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>

<body>

  <div class="auth-container">
    <div class="card p-4 border-gradient">
      <div class="text-center mb-4">
        <h1 class="text-gradient">Login to GRP</h1>
        <p class="text-muted">Access your speech transcription dashboard</p>
      </div>

      <form id="login-form" class="transition">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" required placeholder="Enter your email">
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required placeholder="Enter your password">
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3 pulse">
          Login
        </button>

        <div id="login-error" class="mt-3 text-danger" style="display:none;"></div>
      </form>

      <div class="mt-4 text-center">
        <p class="mb-0">
          Don't have an account?
          <a href="register.html">Register here</a>
        </p>
      </div>
    </div>
  </div>

  <!-- IMPORTANT: Load as ES module -->
  <script type="module" src="../assets/js/auth.js"></script>

</body>

</html>
