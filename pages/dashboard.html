<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard | GRP</title>

  <!-- Bootstrap CSS (required for btn/row/modal/badge/etc.) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Your custom styles (override Bootstrap) -->
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>

<body>

  <div class="dashboard-header text-center container py-4">
    <h1 class="text-gradient">Welcome to Your Dashboard</h1>
    <p class="lead" id="welcome-line">Manage your tickets and recordings</p>

    <div class="mt-3">
      <button id="logoutBtn" class="btn btn-outline-secondary">Logout</button>
    </div>
  </div>

  <div class="text-center mb-4">
    <!-- Opens modal -->
    <button id="newTicketBtn" class="btn btn-primary btn-lg" data-bs-toggle="modal" data-bs-target="#ticketModal">
      <span class="me-2">+</span> Raise New Ticket
    </button>
  </div>

  <!-- Placeholder until we wire tickets API -->
  <div class="mt-5 container">
    <h3 class="text-center mb-4">Ticket Status Summary</h3>
    <div class="d-flex justify-content-center gap-2 flex-wrap" id="ticket-summary">
      <span class="badge bg-secondary">No data yet</span>
    </div>
  </div>

  <div class="mt-5 container">
    <h3 class="text-center mb-4">Tickets</h3>
    <div class="row g-3" id="tickets-list">
      <div class="col-12 text-center text-muted">
        Tickets will appear here once we connect the tickets endpoint.
      </div>
    </div>
  </div>

  <!-- Ticket Creation Modal -->
  <div class="modal fade" id="ticketModal" tabindex="-1" aria-labelledby="ticketModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="ticketModalLabel">Create New Ticket</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body" id="modalContent">
          <div class="text-center">
            <p class="mb-4">How would you like to describe your issue?</p>
            <div class="d-grid gap-3">
              <button id="recordOption" class="btn btn-outline-primary btn-lg" type="button">
                Record Audio
              </button>
              <button id="textOption" class="btn btn-outline-success btn-lg" type="button">
                Type Text
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS Bundle (required for modal/dropdowns) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Auth guard + welcome -->
  <script type="module">
    import { getToken, getUser, clearAuth } from "../assets/js/auth.js";

    // simple auth guard
    const token = getToken();
    if (!token) {
      window.location.href = "login.html";
    }

    // welcome message
    const user = getUser();
    const welcome = document.getElementById("welcome-line");
    if (user && welcome) {
      const name = user.full_name || user.name || user.email || "User";
      welcome.textContent = `Logged in as ${name}`;
    }

    // logout
    document.getElementById("logoutBtn")?.addEventListener("click", () => {
      clearAuth();
      window.location.href = "login.html";
    });
  </script>

  <!-- Your existing JS -->
  <script src="../assets/js/components/VoiceTicketRecorder.js"></script>
  <script src="../assets/js/ticketWorkflow.js"></script>

</body>

</html>
